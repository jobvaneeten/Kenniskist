<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Red background -->
  <circle cx="50" cy="50" r="48" fill="#C8102E"/>
  <circle cx="50" cy="50" r="48" fill="none" stroke="white" stroke-width="3.5"/>

  <!-- White horizontal band -->
  <rect x="2" y="40" width="96" height="23" fill="white"/>

  <!-- Cartoon face (head above the band) -->
  <circle cx="50" cy="27" r="13" fill="#FDDCB5"/>
  <!-- Hair / helmet -->
  <path d="M37,27 Q37,12 50,10 Q63,12 63,27 Q58,19 50,17 Q42,19 37,27Z" fill="#7B4F1A"/>
  <!-- Helmet ears -->
  <rect x="36" y="22" width="5" height="9" rx="2.5" fill="#7B4F1A"/>
  <rect x="59" y="22" width="5" height="9" rx="2.5" fill="#7B4F1A"/>
  <!-- Eyes -->
  <circle cx="45" cy="27" r="3.2" fill="#fff"/>
  <circle cx="55" cy="27" r="3.2" fill="#fff"/>
  <circle cx="45.8" cy="27.5" r="2" fill="#1a1a2e"/>
  <circle cx="55.8" cy="27.5" r="2" fill="#1a1a2e"/>
  <circle cx="46.4" cy="26.8" r="0.8" fill="white"/>
  <circle cx="56.4" cy="26.8" r="0.8" fill="white"/>
  <!-- Nose -->
  <ellipse cx="50" cy="31" rx="1.5" ry="1" fill="#e8a87c"/>
  <!-- Smile -->
  <path d="M45,34 Q50,38.5 55,34" stroke="#8B4513" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Cheeks -->
  <circle cx="42" cy="32" r="4" fill="#FF9999" opacity="0.4"/>
  <circle cx="58" cy="32" r="4" fill="#FF9999" opacity="0.4"/>

  <!-- AJAX text on white band -->
  <text x="50" y="55.5" text-anchor="middle" fill="#C8102E" font-weight="900" font-size="13"
        font-family="Arial Black, Arial, sans-serif" letter-spacing="2">AJAX</text>

  <!-- Small AFC below AJAX on white band -->
  <text x="50" y="44" text-anchor="middle" fill="#C8102E" font-size="6.5"
        font-family="Arial, sans-serif" letter-spacing="1">A · F · C</text>

  <!-- Amsterdam text at bottom -->
  <text x="50" y="82" text-anchor="middle" fill="rgba(255,255,255,0.75)" font-size="7.5"
        font-family="Arial, sans-serif" letter-spacing="1.5">AMSTERDAM</text>
</svg>
